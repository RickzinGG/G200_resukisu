name: Compilar Kernel Moto G200

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Compilar com Dabao Action
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/P-A-N-D-A-O/android_kernel_motorola_sm8350
          kernel-branch: 14
          config: vendor/starfox_defconfig
          arch: arm64
          android-version: 14
          ksu: true
          ksu-other: true
          ksu-url: https://github.com/resukiii/resukiSU
          anykernel3: true
          
