name: Compilar Kernel Moto G200

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Compilar com Dabao Action
        uses: dabao1955/kernel_build_action@v1
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_motorola_sm8350
          kernel-branch: lineage-20
          config: vendor/starfox_defconfig
          arch: arm64
          android-version: 12
          ksu: true
          ksu-other: true
          ksu-url: https://github.com/resukiii/resukiSU
          anykernel3: true
