name: Compilar Kernel Moto G200

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Compilar com Dabao Action
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_motorola_sm7325
          kernel-branch: lineage-22.1
          config: vendor/lahaina-qgki_defconfig
          arch: arm64
          android-version: 15 # Atualizado para alinhar perfeitamente com o motor da branch lineage-22.1!
          ksu: true
          anykernel3: true
          
