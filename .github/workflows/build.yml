name: Compilar Kernel Moto G200

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar Source do Kernel Manualmente
        uses: actions/checkout@v4
        with:
          repository: AxionOS-Devices/android_kernel_motorola_sm8350
          ref: 14
          path: kernel/kernel
          submodules: false

      - name: Compilar com Dabao Action
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: local
          config: vendor/starfox_defconfig
          arch: arm64
          android-version: 14
          ksu: true
          ksu-other: true
          ksu-url: https://github.com/resukiii/resukiSU
          anykernel3: true
          
